name: Build and Release ShardScript

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_main: shardscript-${{ github.ref_name }}-windows.zip
            artifact_thirdparty: shardscript-thirdparty-${{ github.ref_name }}-windows.zip
            output_dir: build/bin
          - os: ubuntu-latest
            artifact_main: shardscript-${{ github.ref_name }}-linux.tar.gz
            artifact_thirdparty: shardscript-thirdparty-${{ github.ref_name }}-linux.tar.gz
            output_dir: build/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev \
            mesa-common-dev libasound2-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Pack Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Фильтруем: берем всё, исключаем папку third-party, а также мусорные .lib и .exp файлы линкера
          powershell "Get-ChildItem -Path '${{ matrix.output_dir }}/*' -Exclude 'third-party','*.lib','*.exp' | Compress-Archive -DestinationPath '${{ matrix.artifact_main }}'"
          # Для сторонних либ пакуем только рантайм-файлы (.dll), отсекая статический мусор
          powershell "Get-ChildItem -Path '${{ matrix.output_dir }}/third-party/*' -Exclude '*.lib','*.exp' | Compress-Archive -DestinationPath '${{ matrix.artifact_thirdparty }}'"

      - name: Pack Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          tar -czvf ${{ matrix.artifact_main }} --exclude='third-party' -C ${{ matrix.output_dir }} .
          tar -czvf ${{ matrix.artifact_thirdparty }} -C ${{ matrix.output_dir }}/third-party .

      - name: Upload Interim Main Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-main
          path: ${{ matrix.artifact_main }}

      - name: Upload Interim ThirdParty Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-thirdparty
          path: ${{ matrix.artifact_thirdparty }}

  publish-github:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-*'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            shardscript-${{ github.ref_name }}-windows.zip
            shardscript-thirdparty-${{ github.ref_name }}-windows.zip
            shardscript-${{ github.ref_name }}-linux.tar.gz
            shardscript-thirdparty-${{ github.ref_name }}-linux.tar.gz
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          generate_release_notes: true

  publish-nuget:
    name: Pack and Publish NuGet
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download Native DLLs for NuGet
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-main
          path: ShardScript.NET/bin/Release/net1.0/

      - name: Fake Local Build Path for MSBuild
        run: |
          mkdir -p out/build/x64-debug/bin/
          cp ShardScript.NET/bin/Release/net10.0/ShardScript.dll out/build/x64-debug/bin/

      - name: Restore Dependencies
        run: dotnet restore ShardScript.NET/ShardScript.NET.csproj

      - name: Build and Pack NuGet Package
        run: |
          dotnet pack ShardScript.NET/ShardScript.NET.csproj -c Release -o out /p:Version=${{ github.ref_name }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate